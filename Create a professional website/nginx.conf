server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self' https: 'unsafe-inline' 'unsafe-eval' data: blob:; img-src 'self' https: data:; font-src 'self' https://fonts.gstatic.com https://fonts.googleapis.com; frame-src 'none';" always;

    # Serve HTML pages directly — no redirect issues
    location = /          { try_files /index.html =404; }
    location = /services  { try_files /services.html =404; }
    location = /about     { try_files /about.html =404; }
    location = /contact   { try_files /contact.html =404; }
    location = /careers   { try_files /careers.html =404; }
    location = /blog      { try_files /blog.html =404; }
    location = /pricing   { try_files /pricing.html =404; }
    location = /ai-training  { try_files /ai-training.html =404; }
    location = /case-studies { try_files /case-studies.html =404; }

    # Static assets — cache 1 year
    location ~* \.(js|css|svg|woff2|woff|ttf|eot|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # HTML — always fresh
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    # 404 fallback
    error_page 404 /index.html;
}
